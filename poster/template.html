<svg id="poster" viewBox="0 0 1000 1414" xmlns="http://www.w3.org/2000/svg"></svg>
<script>
// ─────────────────────────────────────────────────────────────────────────────
// DATA — injecté depuis POST /api/basic/natal-chart
// ─────────────────────────────────────────────────────────────────────────────
const DATA = window.__POSTER_DATA__ || {
  name:       "Marie",
  birthDate:  "15 mai 1992",
  birthTime:  "14h30",
  birthPlace: "Paris, France",
  ascendant:  220.5,
  mc:         130.2,
  planets: [
    { name:"Soleil",  symbol:"☉", lon:55.3,  house:10, color:"#f4c842", retro:false },
    { name:"Lune",    symbol:"☽", lon:118.7, house:12, color:"#c5cae9", retro:false },
    { name:"Mercure", symbol:"☿", lon:48.2,  house:9,  color:"#90a4ae", retro:true  },
    { name:"Vénus",   symbol:"♀", lon:30.1,  house:9,  color:"#80cfa0", retro:false },
    { name:"Mars",    symbol:"♂", lon:162.4, house:2,  color:"#ff7070", retro:false },
    { name:"Jupiter", symbol:"♃", lon:298.7, house:7,  color:"#64b5f6", retro:false },
    { name:"Saturne", symbol:"♄", lon:295.3, house:7,  color:"#bcaaa4", retro:true  },
    { name:"Uranus",  symbol:"♅", lon:288.1, house:6,  color:"#4dd0e1", retro:false },
    { name:"Neptune", symbol:"♆", lon:283.7, house:6,  color:"#b39ddb", retro:true  },
    { name:"Pluton",  symbol:"♇", lon:222.4, house:5,  color:"#9e9e9e", retro:false },
  ],
  houses: [220.5,248.2,276.8,310.2,342.1,14.5,40.5,68.2,96.8,130.2,162.1,194.5],
  aspects: [
    { a:0, b:2, type:"Conjonction", color:"#f4c842", opacity:0.7,  dash:null  },
    { a:0, b:4, type:"Trigone",     color:"#64b5f6", opacity:0.6,  dash:null  },
    { a:1, b:5, type:"Opposition",  color:"#ff7070", opacity:0.55, dash:"5,3" },
    { a:3, b:7, type:"Carré",       color:"#ff9060", opacity:0.5,  dash:"3,3" },
    { a:2, b:5, type:"Sextile",     color:"#80cfa0", opacity:0.5,  dash:null  },
    { a:0, b:9, type:"Conjonction", color:"#f4c842", opacity:0.45, dash:null  },
    { a:6, b:8, type:"Conjonction", color:"#f4c842", opacity:0.4,  dash:null  },
  ],
};

// ─────────────────────────────────────────────────────────────────────────────
// LAYOUT
// ─────────────────────────────────────────────────────────────────────────────
const CX = 500, CY = 660;
const R = { core:76, houses:190, planet:232, zodIn:266, zodOut:312, label:342 };

// ─────────────────────────────────────────────────────────────────────────────
// RÉFÉRENTIELS
// ─────────────────────────────────────────────────────────────────────────────
const SIGNS      = ["♈","♉","♊","♋","♌","♍","♎","♏","♐","♑","♒","♓"];
const SIGN_NAMES = ["Bélier","Taureau","Gémeaux","Cancer","Lion","Vierge",
                    "Balance","Scorpion","Sagittaire","Capricorne","Verseau","Poissons"];
const ELEMENTS   = ["fire","earth","air","water","fire","earth","air","water","fire","earth","air","water"];
const ELEM_COLOR = { fire:"#ff6b5b", earth:"#5cba7d", air:"#5ba8ff", water:"#9b7de8" };
const ELEM_LABEL = { fire:"Feu", earth:"Terre", air:"Air", water:"Eau" };
const ASPECT_ANGLES = { Conjonction:"0°", Sextile:"60°", Carré:"90°", Trigone:"120°", Opposition:"180°" };

// ─────────────────────────────────────────────────────────────────────────────
// HELPERS
// ─────────────────────────────────────────────────────────────────────────────
const toRad = d => d * Math.PI / 180;
const lonToAngle = (lon, asc) => toRad(180 - (lon - asc));
const polar = (r, a) => ({ x: CX + r * Math.cos(a), y: CY + r * Math.sin(a) });
const signIdx = lon => Math.floor(((lon % 360) + 360) % 360 / 30);
const NS = "http://www.w3.org/2000/svg";

function el(tag, attrs, parent) {
  const e = document.createElementNS(NS, tag);
  for (const [k,v] of Object.entries(attrs||{})) e.setAttribute(k,v);
  if (parent) parent.appendChild(e);
  return e;
}
function txt(content, attrs, parent) { const e=el("text",attrs,parent); e.textContent=content; return e; }
function seg(x1,y1,x2,y2,a,p) { return el("line",{x1,y1,x2,y2,...a},p); }
function circ(cx,cy,r,a,p)    { return el("circle",{cx,cy,r,...a},p); }
function rect(x,y,w,h,a,p)    { return el("rect",{x,y,width:w,height:h,...a},p); }

function sectorPath(r1, r2, a1, a2) {
  const p1i=polar(r1,a1), p1o=polar(r2,a1), p2o=polar(r2,a2), p2i=polar(r1,a2);
  return `M${p1i.x} ${p1i.y}L${p1o.x} ${p1o.y}A${r2} ${r2} 0 0 0 ${p2o.x} ${p2o.y}L${p2i.x} ${p2i.y}A${r1} ${r1} 0 0 1 ${p1i.x} ${p1i.y}Z`;
}

// Arc de cercle ouvert (pour le stellium)
function arcPath(r, a1, a2) {
  const p1=polar(r,a1), p2=polar(r,a2);
  // Arc CCW (sweep=0) de a1 à a2
  const large = 0; // toujours < 180° pour une maison
  return `M${p1.x} ${p1.y}A${r} ${r} 0 ${large} 0 ${p2.x} ${p2.y}`;
}

function goldDivider(y) {
  seg(78,y,460,y,{stroke:"#c9a84c","stroke-width":"0.55",opacity:"0.45"},svg);
  seg(540,y,922,y,{stroke:"#c9a84c","stroke-width":"0.55",opacity:"0.45"},svg);
  el("polygon",{points:`500,${y-7} 507,${y} 500,${y+7} 493,${y}`,fill:"#c9a84c",opacity:"0.55"},svg);
}
function lightDivider(y) {
  seg(78,y,922,y,{stroke:"#7c6af7","stroke-width":"0.3",opacity:"0.25"},svg);
}
function cornerMark(x, y, dir) {
  const sx=dir.includes("r")?-1:1, sy=dir.includes("b")?-1:1;
  seg(x,y,x+sx*18,y,{stroke:"#c9a84c","stroke-width":"0.9",opacity:"0.5"},svg);
  seg(x,y,x,y+sy*18,{stroke:"#c9a84c","stroke-width":"0.9",opacity:"0.5"},svg);
  circ(x,y,2.2,{fill:"#c9a84c",opacity:"0.6"},svg);
}

function spreadAngles(raw, minGap=toRad(12)) {
  const items=raw.map(p=>({...p,disp:((p.angle%(2*Math.PI))+(2*Math.PI))%(2*Math.PI)}));
  items.sort((a,b)=>a.disp-b.disp);
  for (let iter=0;iter<80;iter++) {
    let moved=false;
    for (let i=0;i<items.length;i++) {
      const j=(i+1)%items.length;
      const gap=((items[j].disp-items[i].disp)+(2*Math.PI))%(2*Math.PI);
      if (gap<minGap&&gap>0.001) {
        const push=(minGap-gap)/2;
        items[i].disp=((items[i].disp-push)+(2*Math.PI))%(2*Math.PI);
        items[j].disp=((items[j].disp+push)+(2*Math.PI))%(2*Math.PI);
        moved=true;
      }
    }
    if (!moved) break;
  }
  return items;
}

// ─────────────────────────────────────────────────────────────────────────────
// DONNÉES CALCULÉES
// ─────────────────────────────────────────────────────────────────────────────
const asc = DATA.ascendant;

// Aspects : 1 par type, top 4 par importance
const shownAspects = Object.values(
  DATA.aspects.reduce((acc, asp) => {
    if (!acc[asp.type] || asp.opacity > acc[asp.type].opacity) acc[asp.type] = asp;
    return acc;
  }, {})
).sort((a,b) => b.opacity - a.opacity).slice(0, 4);

// Légende aspects — uniquement les types présents, triés par ordre standard
const legendAspects = shownAspects.map(asp => ({
  name:  asp.type,
  angle: ASPECT_ANGLES[asp.type] || "",
  color: asp.color,
  dash:  asp.dash,
}));

// Éléments
const elemCount = {fire:0,earth:0,air:0,water:0};
DATA.planets.forEach(p => elemCount[ELEMENTS[signIdx(p.lon)]]++);

// Stellium : maisons avec 3+ planètes
const houseCount = {};
DATA.planets.forEach(p => { houseCount[p.house] = (houseCount[p.house]||0)+1; });
const stelliumHouses = new Set(
  Object.entries(houseCount).filter(([,c])=>c>=3).map(([h])=>Number(h))
);

// Big3
const sunSign  = SIGN_NAMES[signIdx(DATA.planets[0].lon)];
const moonSign = SIGN_NAMES[signIdx(DATA.planets[1].lon)];
const ascSign  = SIGN_NAMES[signIdx(DATA.ascendant)];
const mcSign   = SIGN_NAMES[signIdx(DATA.mc)];

// Anti-chevauchement degrés : deux pistes radiales alternées si planètes proches
const rawPlanets = DATA.planets.map((p,idx)=>({...p,idx,angle:lonToAngle(p.lon,asc)}));
const sortedByAngle = [...rawPlanets].sort((a,b)=>{
  const an=((a.angle%(2*Math.PI))+(2*Math.PI))%(2*Math.PI);
  const bn=((b.angle%(2*Math.PI))+(2*Math.PI))%(2*Math.PI);
  return an-bn;
});
sortedByAngle.forEach((p,i)=>{
  const prev=sortedByAngle[(i-1+sortedByAngle.length)%sortedByAngle.length];
  const pa=((prev.angle%(2*Math.PI))+(2*Math.PI))%(2*Math.PI);
  const ca=((p.angle%(2*Math.PI))+(2*Math.PI))%(2*Math.PI);
  let gap=Math.abs(ca-pa); if(gap>Math.PI) gap=2*Math.PI-gap;
  p.degTrack = gap < toRad(11) ? (prev.degTrack===0?1:0) : 0;
});

// ─────────────────────────────────────────────────────────────────────────────
// SVG
// ─────────────────────────────────────────────────────────────────────────────
const svg = document.getElementById("poster");

// ── DEFS ─────────────────────────────────────────────────────────────────────
const defs = el("defs",{},svg);

function makeGlow(id, std) {
  const f=el("filter",{id,x:"-40%",y:"-40%",width:"180%",height:"180%"},defs);
  el("feGaussianBlur",{stdDeviation:String(std),result:"b"},f);
  const m=el("feMerge",{},f);
  el("feMergeNode",{in:"b"},m);
  el("feMergeNode",{in:"SourceGraphic"},m);
}
makeGlow("glow",  2.8);
makeGlow("sglow", 1.4);

const blurF=el("filter",{id:"hblur",x:"-60%",y:"-60%",width:"220%",height:"220%"},defs);
el("feGaussianBlur",{stdDeviation:"30"},blurF);

const bgG=el("radialGradient",{id:"bg",cx:"50%",cy:"42%",r:"60%"},defs);
el("stop",{offset:"0%","stop-color":"#10102a"},bgG);
el("stop",{offset:"100%","stop-color":"#03030d"},bgG);

const coreG=el("radialGradient",{id:"coreG",cx:"50%",cy:"50%",r:"50%"},defs);
el("stop",{offset:"0%","stop-color":"#1e1e40"},coreG);
el("stop",{offset:"100%","stop-color":"#0c0c22"},coreG);

const haloG=el("radialGradient",{id:"haloG",cx:"50%",cy:"50%",r:"50%"},defs);
el("stop",{offset:"0%","stop-color":"#7c6af7","stop-opacity":"0.22"},haloG);
el("stop",{offset:"50%","stop-color":"#4030a0","stop-opacity":"0.08"},haloG);
el("stop",{offset:"100%","stop-color":"#7c6af7","stop-opacity":"0"},haloG);

// ── FOND ─────────────────────────────────────────────────────────────────────
rect(0,0,1000,1414,{fill:"url(#bg)"},svg);
for (let i=0;i<200;i++) {
  const big=Math.random()<0.05;
  circ(Math.random()*1000,Math.random()*1414,
    big?Math.random()*1.5+0.8:Math.random()*0.6+0.15,
    {fill:"#fff",opacity:big?Math.random()*0.55+0.2:Math.random()*0.15+0.04},svg);
}

// ── CADRE ─────────────────────────────────────────────────────────────────────
el("rect",{x:28,y:28,width:944,height:1358,fill:"none",stroke:"#7c6af7","stroke-width":"0.5",opacity:"0.22"},svg);
el("rect",{x:36,y:36,width:928,height:1342,fill:"none",stroke:"#c9a84c","stroke-width":"0.3",opacity:"0.18"},svg);
cornerMark(42,42,"tl"); cornerMark(958,42,"tr");
cornerMark(42,1372,"bl"); cornerMark(958,1372,"br");

// ── HEADER ───────────────────────────────────────────────────────────────────
seg(78,74,368,74,{stroke:"#7c6af7","stroke-width":"0.45",opacity:"0.3"},svg);
seg(632,74,922,74,{stroke:"#7c6af7","stroke-width":"0.45",opacity:"0.3"},svg);
circ(372,74,2.2,{fill:"#7c6af7",opacity:"0.4"},svg);
circ(628,74,2.2,{fill:"#7c6af7",opacity:"0.4"},svg);
txt("THÈME NATAL",{x:500,y:79,"text-anchor":"middle",
  "font-family":"'DM Sans',sans-serif","font-size":"13","font-weight":"400","letter-spacing":"8",
  fill:"#8888b8"},svg);

// Nom — ombre + principal
txt(DATA.name.toUpperCase(),{x:502,y:155,"text-anchor":"middle",
  "font-family":"'Playfair Display',serif","font-size":"82","font-weight":"600",
  fill:"#6c6af0",opacity:"0.12"},svg);
txt(DATA.name.toUpperCase(),{x:500,y:152,"text-anchor":"middle",
  "font-family":"'Playfair Display',serif","font-size":"82","font-weight":"600",
  fill:"#f4f4fc"},svg);

// Ligne décorative sous le nom (amélioration typo)
const nameW = 280;
seg(500-nameW,170,500-14,170,{stroke:"#7c6af7","stroke-width":"0.5",opacity:"0.35"},svg);
seg(500+14,170,500+nameW,170,{stroke:"#7c6af7","stroke-width":"0.5",opacity:"0.35"},svg);
circ(500,170,3,{fill:"none",stroke:"#c9a84c","stroke-width":"0.8",opacity:"0.5"},svg);
circ(500,170,1.2,{fill:"#c9a84c",opacity:"0.6"},svg);

// ── BIG 3 — zones fixes 200px, centrées ───────────────────────────────────────
// Fix alignement : tout est centré sur cx, indépendamment de la longueur du signe
const b3data = [
  { label:"SOLEIL",    sym:DATA.planets[0].symbol, color:DATA.planets[0].color,
    lon:DATA.planets[0].lon },
  { label:"LUNE",      sym:DATA.planets[1].symbol, color:DATA.planets[1].color,
    lon:DATA.planets[1].lon },
  { label:"ASCENDANT", sym:"↑", color:"#c9a84c",
    lon:DATA.ascendant },
];
const B3_CX = [200, 500, 800];
const B3_Y  = 198;

seg(358,180,358,222,{stroke:"#7c6af7","stroke-width":"0.4",opacity:"0.25"},svg);
seg(642,180,642,222,{stroke:"#7c6af7","stroke-width":"0.4",opacity:"0.25"},svg);

b3data.forEach((item, i) => {
  const cx = B3_CX[i];
  const si = signIdx(item.lon);
  const elemCol = ELEM_COLOR[ELEMENTS[si]];

  // Planète symbol (centré à cx-28)
  txt(item.sym,{x:cx-26,y:B3_Y,"text-anchor":"middle","dominant-baseline":"central",
    "font-size":"18",fill:item.color,filter:"url(#sglow)"},svg);
  // Signe glyph (centré à cx-4)
  txt(SIGNS[si],{x:cx-2,y:B3_Y,"text-anchor":"middle","dominant-baseline":"central",
    "font-size":"22",fill:elemCol,opacity:"0.92",filter:"url(#sglow)"},svg);
  // Nom signe centré sur cx+34 — text-anchor:start garantit l'alignement gauche constant
  // En fixant le point de départ, tous les noms s'alignent pareil
  txt(SIGN_NAMES[si],{x:cx+16,y:B3_Y,"dominant-baseline":"central",
    "font-family":"'DM Sans',sans-serif","font-size":"14","font-weight":"500",
    fill:"#c8c8ec"},svg);
  // Label planète (centré exactement)
  txt(item.label,{x:cx,y:B3_Y+18,"text-anchor":"middle",
    "font-family":"'DM Sans',sans-serif","font-size":"8","font-weight":"300","letter-spacing":"3",
    fill:"#686890"},svg);
});

// Date · Heure
txt(`${DATA.birthDate}  ·  ${DATA.birthTime}`,{x:500,y:234,"text-anchor":"middle",
  "font-family":"'DM Sans',sans-serif","font-size":"16","font-weight":"300","letter-spacing":"2",
  fill:"#9090c0"},svg);
txt(DATA.birthPlace,{x:500,y:254,"text-anchor":"middle",
  "font-family":"'DM Sans',sans-serif","font-size":"13","font-weight":"300","letter-spacing":"1",
  fill:"#6868a0"},svg);

goldDivider(270);

// ── HALO ROUE ────────────────────────────────────────────────────────────────
circ(CX,CY,420,{fill:"url(#haloG)",filter:"url(#hblur)"},svg);

// ── CERCLE CENTRAL ────────────────────────────────────────────────────────────
circ(CX,CY,R.core,{fill:"url(#coreG)",stroke:"#9080f0","stroke-width":"0.9",opacity:"0.7"},svg);
for (let i=0;i<8;i++) {
  const a=toRad(i*45);
  seg(polar(5,a).x,polar(5,a).y,polar(13,a).x,polar(13,a).y,
    {stroke:"#8070e8","stroke-width":"0.8",opacity:"0.5"},svg);
}
circ(CX,CY,3,{fill:"#a395f9",opacity:"0.7"},svg);

// ── ASPECTS ───────────────────────────────────────────────────────────────────
for (const asp of shownAspects) {
  const pa=DATA.planets[asp.a], pb=DATA.planets[asp.b];
  const aa=lonToAngle(pa.lon,asc), ab=lonToAngle(pb.lon,asc);
  const ptA=polar(R.houses-4,aa), ptB=polar(R.houses-4,ab);
  const attrs={stroke:asp.color,"stroke-width":"1.1",opacity:asp.opacity};
  if (asp.dash) attrs["stroke-dasharray"]=asp.dash;
  seg(ptA.x,ptA.y,ptB.x,ptB.y,attrs,svg);
  circ(ptA.x,ptA.y,3.2,{fill:asp.color,opacity:String(Math.min(asp.opacity+0.15,1))},svg);
  circ(ptB.x,ptB.y,3.2,{fill:asp.color,opacity:String(Math.min(asp.opacity+0.15,1))},svg);
}

// ── LIGNES DE MAISONS ─────────────────────────────────────────────────────────
for (let i=0;i<12;i++) {
  const angle=lonToAngle(DATA.houses[i],asc);
  const pIn=polar(R.core,angle), pOut=polar(R.houses,angle);
  const isA=[0,3,6,9].includes(i);
  seg(pIn.x,pIn.y,pOut.x,pOut.y,{
    stroke:isA?"#b0a0ff":"#7c6af7",
    "stroke-width":isA?"1.6":"0.55",
    opacity:isA?"0.7":"0.28",
  },svg);
}

// Numéros de maisons + indicateur stellium
for (let i=0;i<12;i++) {
  const c1=DATA.houses[i], c2=DATA.houses[(i+1)%12];
  let mid=c2>=c1?(c1+c2)/2:(c1+c2+360)/2;
  if (mid>=360) mid-=360;
  const houseNum = i+1;
  const isStellium = stelliumHouses.has(houseNum);
  const pt=polar(145,lonToAngle(mid,asc));

  if (isStellium) {
    // Arc doré sur l'anneau maisons pour les maisons stellium
    const a1=lonToAngle(c1,asc), a2=lonToAngle(c2,asc);
    el("path",{d:sectorPath(R.houses-1,R.houses+8,a1,a2),
      fill:"#c9a84c",opacity:"0.18"},svg);
    el("path",{d:arcPath(R.houses+4,a1,a2),
      fill:"none",stroke:"#c9a84c","stroke-width":"1.5",opacity:"0.55"},svg);
    // Étoile stellium à côté du numéro
    txt("★",{x:pt.x+14,y:pt.y-8,"text-anchor":"middle","dominant-baseline":"central",
      "font-size":"8",fill:"#c9a84c",opacity:"0.8"},svg);
  }

  txt(String(houseNum),{x:pt.x,y:pt.y,"text-anchor":"middle","dominant-baseline":"central",
    "font-family":"'DM Sans',sans-serif","font-size":"13","font-weight":isStellium?"600":"400",
    fill:isStellium?"#c9a84c":"#7878a8"},svg);
}

// ── ANNEAUX ───────────────────────────────────────────────────────────────────
circ(CX,CY,R.houses,{fill:"none",stroke:"#7c6af7","stroke-width":"0.65",opacity:"0.42"},svg);
circ(CX,CY,R.zodIn, {fill:"none",stroke:"#7c6af7","stroke-width":"0.65",opacity:"0.42"},svg);
circ(CX,CY,R.zodOut,{fill:"none",stroke:"#9080ff","stroke-width":"1.1", opacity:"0.55"},svg);

// ── ANNEAU ZODIACAL ───────────────────────────────────────────────────────────
for (let i=0;i<12;i++) {
  const a1=lonToAngle(i*30,asc), a2=lonToAngle((i+1)*30,asc);
  const col=ELEM_COLOR[ELEMENTS[i]];
  el("path",{d:sectorPath(R.zodIn,R.zodOut,a1,a2),fill:col,opacity:"0.10"},svg);
  const pI=polar(R.zodIn,a1), pO=polar(R.zodOut,a1);
  seg(pI.x,pI.y,pO.x,pO.y,{stroke:col,"stroke-width":"0.6",opacity:"0.3"},svg);
  const ps=polar((R.zodIn+R.zodOut)/2,lonToAngle(i*30+15,asc));
  txt(SIGNS[i],{x:ps.x,y:ps.y,"text-anchor":"middle","dominant-baseline":"central",
    "font-size":"21",fill:col,opacity:"0.95",filter:"url(#sglow)"},svg);
}

// Ticks 5°
for (let d=0;d<360;d+=5) {
  const is30=d%30===0, a=lonToAngle(d,asc);
  const pI=polar(R.zodOut+1,a), pO=polar(R.zodOut+(is30?10:5),a);
  seg(pI.x,pI.y,pO.x,pO.y,{stroke:"#7c6af7",
    "stroke-width":is30?"1":"0.4",opacity:is30?"0.55":"0.25"},svg);
}

// ── PLANÈTES — repères + degrés (deux pistes anti-chevauchement) ──────────────
for (const p of rawPlanets) {
  const pA=polar(R.houses+3,p.angle), pB=polar(R.zodIn-3,p.angle);
  seg(pA.x,pA.y,pB.x,pB.y,{stroke:p.color,"stroke-width":"1.2",opacity:"0.65"},svg);
  circ(pA.x,pA.y,2.2,{fill:p.color,opacity:"0.8"},svg);
}

// Degrés avec deux pistes (track 0 = intérieur, track 1 = plus extérieur)
for (const p of sortedByAngle) {
  const deg=Math.floor(((p.lon%30)+30)%30);
  const rDeg = p.degTrack===0 ? R.zodIn-15 : R.zodIn-6;
  const dp=polar(rDeg,p.angle);
  txt(`${deg}°`,{x:dp.x,y:dp.y,"text-anchor":"middle","dominant-baseline":"central",
    "font-family":"'DM Sans',sans-serif","font-size":"9","font-weight":"500",
    fill:p.color,opacity:"0.8"},svg);
}

// ── PLANÈTES — symboles (espacés) ─────────────────────────────────────────────
const spread=spreadAngles(rawPlanets);
for (const p of spread) {
  const pt=polar(R.planet,p.disp);
  circ(pt.x,pt.y,15,{fill:p.color,opacity:"0.12",filter:"url(#glow)"},svg);
  circ(pt.x,pt.y,15,{fill:"#070714",stroke:p.color,"stroke-width":"1.1",opacity:"0.95"},svg);
  txt(p.symbol,{x:pt.x,y:pt.y,"text-anchor":"middle","dominant-baseline":"central",
    "font-size":"17",fill:p.color,filter:"url(#sglow)"},svg);
  // Marqueur rétrograde ℞ sous le cercle
  if (p.retro) {
    txt("℞",{x:pt.x,y:pt.y+24,"text-anchor":"middle",
      "font-family":"'DM Sans',sans-serif","font-size":"10","font-weight":"400",
      fill:p.color,opacity:"0.75",filter:"url(#sglow)"},svg);
  }
}

// ── ASC / MC ──────────────────────────────────────────────────────────────────
for (const [label,lon] of [["ASC",asc],["MC",DATA.mc]]) {
  const angle=lonToAngle(lon,asc);
  const p1=polar(R.zodOut+2,angle), p2=polar(R.zodOut+18,angle);
  seg(p1.x,p1.y,p2.x,p2.y,{stroke:"#c9a84c","stroke-width":"2.5",opacity:"0.85"},svg);
  const pt=polar(R.label+10,angle);
  txt(label,{x:pt.x,y:pt.y,"text-anchor":"middle","dominant-baseline":"central",
    "font-family":"'DM Sans',sans-serif","font-size":"13","font-weight":"600","letter-spacing":"1",
    fill:"#c9a84c",filter:"url(#sglow)"},svg);
}
circ(CX,CY,R.zodOut+26,{fill:"none",stroke:"#c9a84c","stroke-width":"0.3",opacity:"0.2"},svg);

goldDivider(1016);

// ── LÉGENDE ASPECTS (dynamique : uniquement les types présents) ───────────────
const legY=1042;
txt("ASPECTS",{x:500,y:legY-14,"text-anchor":"middle",
  "font-family":"'DM Sans',sans-serif","font-size":"9","font-weight":"400","letter-spacing":"5",
  fill:"#7070a0"},svg);

// Positions calculées dynamiquement selon le nombre d'aspects affichés
const legCount = legendAspects.length;
const legSpacing = 760 / legCount;
legendAspects.forEach((asp,i) => {
  const x = 120 + i * legSpacing;
  const la={stroke:asp.color,"stroke-width":"1.6",opacity:"0.9"};
  if (asp.dash) la["stroke-dasharray"]=asp.dash;
  seg(x,legY,x+20,legY,la,svg);
  txt(asp.name,{x:x+28,y:legY-5,"dominant-baseline":"central",
    "font-family":"'DM Sans',sans-serif","font-size":"11","font-weight":"400",fill:"#a0a0cc"},svg);
  txt(asp.angle,{x:x+28,y:legY+7,"dominant-baseline":"central",
    "font-family":"'DM Sans',sans-serif","font-size":"10","font-weight":"300",fill:"#7070a0"},svg);
  // Noms des planètes en aspect
  const pa=DATA.planets[DATA.aspects.find(a=>a.type===asp.name&&a.color===asp.color)?.a||0];
  const pb=DATA.planets[DATA.aspects.find(a=>a.type===asp.name&&a.color===asp.color)?.b||0];
  if (pa&&pb) {
    txt(`${pa.symbol}${pb.symbol}`,{x:x+28,y:legY+18,"dominant-baseline":"central",
      "font-size":"10",fill:asp.color,opacity:"0.65"},svg);
  }
});

lightDivider(1064);

// ── TABLE PLANÈTES ────────────────────────────────────────────────────────────
const TY=1082, RH=32, CL=248, CR=752;

rect(62,TY-14,384,182,{rx:"5",fill:"#0c0c20",opacity:"0.6"},svg);
rect(554,TY-14,384,182,{rx:"5",fill:"#0c0c20",opacity:"0.6"},svg);

DATA.planets.forEach((p,i) => {
  const isR=i>=5, row=isR?i-5:i, cx=isR?CR:CL;
  const y=TY+row*RH;
  const si=signIdx(p.lon);
  const deg=Math.floor(((p.lon%30)+30)%30);
  const min=Math.floor((((p.lon%30)+30)%30-deg)*60);

  txt(p.symbol,{x:cx-78,y,"text-anchor":"middle","dominant-baseline":"central",
    "font-size":"17",fill:p.color,filter:"url(#sglow)"},svg);

  // Nom + ℞ si rétrograde
  txt(p.name,{x:cx-58,y,"dominant-baseline":"central",
    "font-family":"'DM Sans',sans-serif","font-size":"13","font-weight":"400",fill:"#b0b0d8"},svg);
  if (p.retro) {
    txt("℞",{x:cx-58+(p.name.length*7.5),y,"dominant-baseline":"central",
      "font-family":"'DM Sans',sans-serif","font-size":"9","font-weight":"400",
      fill:p.color,opacity:"0.8"},svg);
  }

  txt(`${deg}°${String(min).padStart(2,"0")}`,{x:cx+20,y,"text-anchor":"middle","dominant-baseline":"central",
    "font-family":"'DM Sans',sans-serif","font-size":"14","font-weight":"500",fill:"#f0f0fc"},svg);
  txt(SIGNS[si],{x:cx+54,y,"text-anchor":"middle","dominant-baseline":"central",
    "font-size":"16",fill:ELEM_COLOR[ELEMENTS[si]],opacity:"0.92"},svg);
  txt(`M${p.house}`,{x:cx+84,y,"text-anchor":"middle","dominant-baseline":"central",
    "font-family":"'DM Sans',sans-serif","font-size":"12","font-weight":"400",fill:"#7878a8"},svg);

  if (row<4)
    seg(cx-92,y+RH/2,cx+96,y+RH/2,{stroke:"#7c6af7","stroke-width":"0.25",opacity:"0.18"},svg);
});

goldDivider(1276);

// ── BARRES ÉLÉMENTAIRES ───────────────────────────────────────────────────────
const EY=1294, BW=168, BH=8;
txt("DOMINANTE ÉLÉMENTAIRE",{x:500,y:EY-4,"text-anchor":"middle",
  "font-family":"'DM Sans',sans-serif","font-size":"9","font-weight":"400","letter-spacing":"5",
  fill:"#7070a0"},svg);

[["fire","earth"],["water","air"]].forEach((row,ri) => {
  row.forEach((elem,ci) => {
    const bx=ci===0?96:530, by=EY+ri*24+14;
    const count=elemCount[elem], pct=Math.round(count/DATA.planets.length*100);
    const col=ELEM_COLOR[elem], filled=Math.round(BW*count/DATA.planets.length);
    txt(ELEM_LABEL[elem],{x:bx,y:by,"dominant-baseline":"central",
      "font-family":"'DM Sans',sans-serif","font-size":"12","font-weight":"500",fill:col},svg);
    rect(bx+50,by-BH/2,BW,BH,{rx:"3",fill:"#1a1a2e",opacity:"0.9"},svg);
    if (filled>0) rect(bx+50,by-BH/2,filled,BH,{rx:"3",fill:col,opacity:"0.75"},svg);
    txt(`${pct}%  ${count}/${DATA.planets.length}`,{x:bx+50+BW+10,y:by,"dominant-baseline":"central",
      "font-family":"'DM Sans',sans-serif","font-size":"10","font-weight":"400",fill:col,opacity:"0.8"},svg);
  });
});

// ── FOOTER ────────────────────────────────────────────────────────────────────
goldDivider(1352);

txt(`↑ ${ascSign}  ·  MC ${mcSign}`,{x:500,y:1366,"text-anchor":"middle",
  "font-family":"'DM Sans',sans-serif","font-size":"12","font-weight":"400","letter-spacing":"2",
  fill:"#c9a84c",opacity:"0.8"},svg);

// URL avec petits ornements
txt("✦",{x:384,y:1378,"text-anchor":"middle","font-size":"8",fill:"#7c6af7",opacity:"0.5"},svg);
txt("guillaumeastro.com",{x:500,y:1378,"text-anchor":"middle",
  "font-family":"'DM Sans',sans-serif","font-size":"10","font-weight":"300","letter-spacing":"4",
  fill:"#8080b0"},svg);
txt("✦",{x:616,y:1378,"text-anchor":"middle","font-size":"8",fill:"#7c6af7",opacity:"0.5"},svg);
</script>
</body>
</html>
