<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0a0a0f"/>
  <!-- Stars -->
  <circle cx="80" cy="60" r="1.5" fill="#a395f9" opacity="0.6"/>
  <circle cx="200" cy="120" r="1" fill="#fff" opacity="0.4"/>
  <circle cx="350" cy="40" r="2" fill="#a395f9" opacity="0.5"/>
  <circle cx="520" cy="90" r="1.2" fill="#fff" opacity="0.3"/>
  <circle cx="720" cy="50" r="1.8" fill="#a395f9" opacity="0.7"/>
  <circle cx="900" cy="80" r="1" fill="#fff" opacity="0.4"/>
  <circle cx="1050" cy="40" r="1.5" fill="#a395f9" opacity="0.5"/>
  <circle cx="1150" cy="110" r="2" fill="#fff" opacity="0.3"/>
  <circle cx="140" cy="500" r="1.2" fill="#a395f9" opacity="0.4"/>
  <circle cx="320" cy="570" r="1.5" fill="#fff" opacity="0.3"/>
  <circle cx="600" cy="540" r="1" fill="#a395f9" opacity="0.5"/>
  <circle cx="850" cy="560" r="1.8" fill="#fff" opacity="0.4"/>
  <circle cx="1080" cy="520" r="1.2" fill="#a395f9" opacity="0.6"/>
  <circle cx="980" cy="580" r="1" fill="#fff" opacity="0.3"/>
  <!-- Decorative circle -->
  <circle cx="600" cy="315" r="220" fill="none" stroke="#7c6af7" stroke-width="0.5" opacity="0.15"/>
  <circle cx="600" cy="315" r="180" fill="none" stroke="#a395f9" stroke-width="0.5" opacity="0.1"/>
  <!-- Logo mark -->
  <text x="600" y="240" font-family="Georgia, 'Times New Roman', serif" font-size="52" font-weight="600" fill="#a395f9" text-anchor="middle" opacity="0.9">✦</text>
  <!-- Main title -->
  <text x="600" y="330" font-family="Georgia, 'Times New Roman', serif" font-size="62" font-weight="600" fill="#f0f0f5" text-anchor="middle">Guillaume Astro</text>
  <!-- Tagline -->
  <text x="600" y="390" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="300" fill="#8888a0" text-anchor="middle" letter-spacing="2">Astrologie personnalisée</text>
  <!-- Bottom accent line -->
  <line x1="480" y1="420" x2="720" y2="420" stroke="#7c6af7" stroke-width="1" opacity="0.4"/>
</svg>
